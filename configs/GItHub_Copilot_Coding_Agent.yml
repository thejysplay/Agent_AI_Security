    paths:
      system_prompt: scenarios/GItHub_Copilot_Coding_Agent/system.txt
      tasks: scenarios/GItHub_Copilot_Coding_Agent/tasks_benign.jsonl
      tools: scenarios/GItHub_Copilot_Coding_Agent/normal_tools.json

  attack:
    paths:
      system_prompt: scenarios/GItHub_Copilot_Coding_Agent/system.txt
      tasks: scenarios/GItHub_Copilot_Coding_Agent/tasks_attack.jsonl
      tools: scenarios/GItHub_Copilot_Coding_Agent/attack_tools.json
