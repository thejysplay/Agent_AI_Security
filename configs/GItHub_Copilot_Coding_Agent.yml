scenario: GItHub_Copilot_Coding_Agent

baseline_tools:
  - Ephemeral_development_environment
  - Test_linter_execution
  - Pull_Request_creation
  - Controlled_internet_access_custom_commands

llm:
  provider: gemini
  model: gemini-2.0-flash
  api_key_file: API_Key/gemini_api_key

